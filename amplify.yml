version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - |
              if command -v nvm >/dev/null 2>&1; then
                nvm install 20
                nvm use 20
              else
                echo "nvm not available; using existing Node $(node -v)"
              fi
            - |
              if command -v yarn >/dev/null 2>&1; then
                yarn install --frozen-lockfile --network-timeout 600000
              else
                npm ci
              fi
            - |
              if [ "$AWS_BRANCH" = "test" ]; then
                echo "Installing Cypress binary for branch $AWS_BRANCH"
                ELECTRON_RUN_AS_NODE= CYPRESS_CACHE_FOLDER="$PWD/.cache/Cypress" npx cypress install
                ELECTRON_RUN_AS_NODE= CYPRESS_CACHE_FOLDER="$PWD/.cache/Cypress" npx cypress verify
              else
                echo "Skipping Cypress binary install on branch $AWS_BRANCH"
              fi
        build:
          commands:
            - |
              if [ "$AWS_BRANCH" = "test" ]; then
                echo "Running Cypress end-to-end tests for branch $AWS_BRANCH"
                if command -v yarn >/dev/null 2>&1; then
                  ELECTRON_RUN_AS_NODE= CYPRESS_CACHE_FOLDER="$PWD/.cache/Cypress" yarn test:e2e
                else
                  ELECTRON_RUN_AS_NODE= CYPRESS_CACHE_FOLDER="$PWD/.cache/Cypress" npm run test:e2e
                fi
              else
                echo "Skipping Cypress on branch $AWS_BRANCH"
              fi
            - |
              if command -v yarn >/dev/null 2>&1; then
                yarn build
              else
                npm run build
              fi
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .cache/Cypress/**/*

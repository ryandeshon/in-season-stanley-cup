name: Auto-Merge Release PR

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: |
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'changeset-release/main' &&
      github.event.pull_request.title == 'chore(release): version packages' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            try {
              await github.graphql(
                `mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(
                    input: {
                      pullRequestId: $pullRequestId
                      mergeMethod: MERGE
                    }
                  ) {
                    pullRequest {
                      number
                    }
                  }
                }`,
                { pullRequestId: pr.node_id }
              );

              core.info(`Enabled auto-merge for PR #${pr.number}.`);
            } catch (error) {
              const message = String(error?.message || "");
              if (message.includes("Auto merge is already enabled")) {
                core.info(`Auto-merge already enabled for PR #${pr.number}.`);
                return;
              }
              throw error;
            }

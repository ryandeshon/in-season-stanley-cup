name: Release Versioning

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Update release PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Create or update version PR
        id: changesets
        continue-on-error: true
        uses: changesets/action@v1
        with:
          version: yarn version:prepare
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report restricted PR permissions
        if: steps.changesets.outcome == 'failure'
        run: |
          echo "::warning::Release branch was updated, but pull request creation is blocked for GITHUB_TOKEN."
          echo "::warning::Enable repository setting 'Allow GitHub Actions to create and approve pull requests' to restore automatic release PR creation."
